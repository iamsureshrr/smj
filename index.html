<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Earrings & Necklace Shop</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
    header { background: #6a1b9a; color: white; padding: 15px; text-align: center; }
    nav a { color: white; margin: 0 10px; text-decoration: none; }
    .hero { background: #f3e5f5; padding: 40px; text-align: center; }
    .products { display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; }
    .product { border: 1px solid #ddd; margin: 10px; padding: 15px; width: 220px; text-align: center; }
    .product img { width: 100%; height: auto; }
    button { background: #6a1b9a; color: white; border: none; padding: 10px; cursor: pointer; }
    button:hover { background: #4a148c; }
    .cart { background: #f4f4f4; padding: 20px; }
    footer { background: #333; color: white; text-align: center; padding: 10px; }
  </style>
</head>
<body>
  <header>
    <h1>Shine Jewelry</h1>
    <nav>
      <a href="#">Home</a>
      <a href="#">Shop</a>
      <a href="#">Cart</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <section class="hero">
    <h2>Elegant Earrings & Necklaces</h2>
    <p>Discover timeless designs for every occasion.</p>
  </section>

  <section class="products">
    <div class="product">
      <img src="earring1.jpg" alt="Gold Earrings">
      <h3>Gold Earrings</h3>
      <p>₹2500</p>
      <button onclick="addToCart('Gold Earrings', 2500)">Add to Cart</button>
    </div>

    <div class="product">
      <img src="necklace1.jpg" alt="Pearl Necklace">
      <h3>Pearl Necklace</h3>
      <p>₹4000</p>
      <button onclick="addToCart('Pearl Necklace', 4000)">Add to Cart</button>
    </div>

    <div class="product">
      <img src="earring2.jpg" alt="Silver Earrings">
      <h3>Silver Earrings</h3>
      <p>₹1800</p>
      <button onclick="addToCart('Silver Earrings', 1800)">Add to Cart</button>
    </div>
  </section>

  <section class="cart">
    <h2>Your Cart</h2>
    <ul id="cart-items"></ul>
    <p id="total">Total: ₹0</p>
  </section>

  <footer>
    <p>&copy; 2026 Shine Jewelry</p>
  </footer>

  <script>
    let cart = [];
    let total = 0;

    function addToCart(item, price) {
      cart.push({ item, price });
      total += price;
      updateCart();
    }

    function updateCart() {
      const cartItems = document.getElementById("cart-items");
      cartItems.innerHTML = "";
      cart.forEach(c => {
        const li = document.createElement("li");
        li.textContent = `${c.item} - ₹${c.price}`;
        cartItems.appendChild(li);
      });
      document.getElementById("total").textContent = `Total: ₹${total}`;
    }
  </script>
</body>
</html>

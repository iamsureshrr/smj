<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="store-title">Jeevan Jewellery</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body class="bg-gray-50 text-slate-800 antialiased font-sans pb-24">

    <header class="bg-white border-b border-gray-200 sticky top-0 z-40 px-4 py-3 flex items-center justify-between">
        <h1 id="store-title" class="text-xl font-bold tracking-tight text-slate-900">Jeevan Jewellery</h1>
        <button id="add-prod-btn" onclick="openAdminPopup()" style="display: none;" class="bg-blue-600 text-white text-sm font-medium px-4 py-2 rounded-lg hover:bg-blue-700 transition flex items-center gap-1">
            ➕ Add Product
        </button>
    </header>

    <section class="p-4 max-w-4xl mx-auto flex flex-col gap-3">
        <input type="text" id="search-box" oninput="filterStore()" placeholder="Search items by name or code..." class="w-full bg-white border border-gray-300 rounded-xl px-4 py-3 text-sm shadow-sm focus:outline-none focus:border-blue-500">
        
        <div class="flex gap-2 overflow-x-auto pb-1 text-xs no-scrollbar">
            <button id="chip-InStock" onclick="selectCategory('In Stock', this)" class="chip active whitespace-nowrap bg-gray-200 px-4 py-2 rounded-full font-medium transition">In Stock</button>
            <button id="chip-All" onclick="selectCategory('All', this)" class="chip whitespace-nowrap bg-gray-200 px-4 py-2 rounded-full font-medium transition">Show All</button>
            <button id="chip-ComingSoon" onclick="selectCategory('Coming Soon', this)" class="chip whitespace-nowrap bg-gray-200 px-4 py-2 rounded-full font-medium transition">Coming Soon</button>
            <button id="chip-Sold" onclick="selectCategory('Sold', this)" class="chip whitespace-nowrap bg-gray-200 px-4 py-2 rounded-full font-medium transition">Sold Out</button>
        </div>
    </section>

    <div class="max-w-4xl mx-auto px-4 flex gap-2 justify-end text-xs">
        <button class="sort-btn active px-3 py-1.5 border border-gray-300 rounded-full bg-white transition" onclick="togglePriceSort('default', this)">Default Order</button>
        <button class="sort-btn px-3 py-1.5 border border-gray-300 rounded-full bg-white transition" onclick="togglePriceSort('price-low-high', this)">Price: Low to High ↑</button>
    </div>

    <main class="p-4 max-w-4xl mx-auto">
        <div id="loading-indicator" class="text-center py-8 text-sm text-gray-500 font-medium">Loading catalog items...</div>
        <div id="products-container" class="grid grid-cols-2 sm:grid-cols-3 gap-3">
            </div>
    </main>

    <div id="cart-sticky-bar" style="display: none;" class="fixed bottom-4 left-1/2 -translate-x-1/2 w-[90%] max-w-md bg-slate-900 text-white rounded-xl shadow-xl px-4 py-3 flex items-center justify-between z-50">
        <div class="flex flex-col">
            <span class="text-xs text-slate-400 font-medium"><span id="cart-count">0</span> items selected</span>
            <span id="cart-total-price" class="text-base font-bold text-emerald-400">₹0</span>
        </div>
        <button onclick="alert('WhatsApp Order Integration Triggered')" class="bg-emerald-500 hover:bg-emerald-600 px-4 py-2 rounded-lg text-sm font-semibold transition">Order via WhatsApp</button>
    </div>

    <div id="detailsModal" style="display: none;" class="fixed inset-0 bg-black/60 z-50 flex justify-center items-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-2xl w-full max-w-md overflow-hidden max-h-[90vh] flex flex-col relative">
            <button onclick="closeDetailsModal()" class="absolute top-3 right-3 bg-white/80 backdrop-blur text-slate-800 font-bold rounded-full w-8 h-8 flex items-center justify-center border border-gray-200 cursor-pointer shadow z-10">✕</button>
            
            <div class="overflow-y-auto p-4 flex flex-col gap-3">
                <div class="w-full bg-gray-100 rounded-xl overflow-hidden shadow-inner flex justify-center items-center">
                    <img id="details-main-img" src="" alt="Product Showcase" class="w-full h-auto max-h-[340px] object-contain cursor-zoom-in transition" title="Click for clear full screen presentation view">
                </div>
                
                <div id="details-thumbs" class="flex gap-2 overflow-x-auto py-1"></div>

                <div class="mt-1">
                    <span id="details-code" class="text-xs font-mono bg-slate-100 text-slate-600 px-2 py-0.5 rounded">CODE</span>
                    <h2 id="details-title" class="text-lg font-bold text-slate-900 mt-1">Product Title Header</h2>
                    <div id="details-price-block" class="text-emerald-600 mt-1"></div>
                    <p id="details-desc" class="text-sm text-slate-600 mt-2 leading-relaxed border-t border-gray-100 pt-2">Detailed description notes.</p>
                </div>
            </div>
        </div>
    </div>

    <div id="adminModal" style="display: none;" class="fixed inset-0 bg-black/60 z-50 flex justify-center items-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-md p-5 overflow-y-auto max-h-[92vh]">
            <form id="product-form" onsubmit="saveProduct(event)">
                <h2 id="form-title" class="text-lg font-bold text-slate-900 mb-4 border-b pb-2">Add New Product</h2>
                <input type="hidden" id="product-id">

                <div class="form-group">
                    <label>Product Code / Model Index</label>
                    <input type="text" id="prod-code" placeholder="e.g., JVN-M102">
                </div>

                <div class="form-group">
                    <label>Product Image Files Selection</label>
                    <input type="file" id="prod-img-file" accept="image/*" multiple onchange="handleImageUpload(event)" class="bg-gray-50 file:mr-4 file:py-1 file:px-3 file:rounded-md file:border-0 file:text-xs file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                    <div id="admin-preview-wrapper" class="flex flex-wrap gap-1 mt-2 bg-gray-50 rounded-lg p-1 min-h-[40px] border border-dashed border-gray-300"></div>
                </div>

                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" id="prod-name" required placeholder="e.g., Ruby Studded Gold Earrings">
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <div class="form-group">
                        <label>Selling Price (₹)</label>
                        <input type="number" id="prod-price" required placeholder="15000">
                    </div>
                    <div class="form-group">
                        <label>MRP Valuation (₹)</label>
                        <input type="number" id="prod-mrp" placeholder="18500">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <div class="form-group">
                        <label>Stock Count</label>
                        <input type="number" id="prod-stock" value="1" min="0">
                    </div>
                    <div class="form-group">
                        <label>Arrangement Weight (Order)</label>
                        <input type="number" id="prod-sortorder" value="999" placeholder="1, 2, 3 first">
                    </div>
                </div>

                <div class="form-group">
                    <label>Product Status Classification</label>
                    <select id="prod-status">
                        <option value="In Stock">In Stock</option>
                        <option value="Out of Stock">Out of Stock</option>
                        <option value="Sold">Sold</option>
                        <option value="Coming Soon">Coming Soon</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Product Description Notes</label>
                    <textarea id="prod-desc" rows="2" placeholder="Provide description, weight details etc."></textarea>
                </div>

                <div class="flex gap-2 mt-5 pt-2 border-t border-gray-100">
                    <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold py-2 px-4 rounded-lg flex-1 transition">Save Product Data</button>
                    <button type="button" onclick="closeAdminPopup()" class="bg-gray-200 hover:bg-gray-300 text-slate-700 text-sm font-medium py-2 px-4 rounded-lg transition">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>

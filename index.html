<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Earnings Sale</title>
    <style>
        :root {
            --primary: #2563eb;
            --success: #22c55e;
            --dark: #1e293b;
            --light: #f8fafc;
        }
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--light);
            color: var(--dark);
        }
        header {
            background-color: var(--dark);
            color: white;
            padding: 0.8rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        header h1 { font-size: 1.2rem; margin: 0; }
        .header-actions { display: flex; gap: 0.5rem; align-items: center; }
        
        .btn {
            color: white; border: none; padding: 0.6rem 0.8rem; border-radius: 6px;
            cursor: pointer; font-weight: bold; font-size: 0.85rem; text-decoration: none;
            display: inline-flex; align-items: center; justify-content: center;
        }
        .btn-primary { background-color: var(--primary); }
        .btn-success { background-color: var(--success); }
        .btn-secondary { background-color: #64748b; }
        .btn-danger { background-color: #dc2626; }
        
        .container { padding: 1rem; max-width: 600px; margin: 0 auto; }
        h2 { font-size: 1.3rem; margin-top: 0; margin-bottom: 1rem; }

        .products-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1rem;
        }
        .product-card {
            background: white; border-radius: 12px; overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06); display: flex; flex-direction: column;
        }
        .img-container { position: relative; width: 100%; height: 160px; overflow: hidden; }
        .product-img { width: 100%; height: 100%; object-fit: cover; background-color: #e2e8f0; }
        
        .status-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.5); display: flex; justify-content: center;
            align-items: center; color: white; font-size: 1.2rem; font-weight: bold; text-transform: uppercase;
        }

        .product-info { padding: 0.8rem; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .product-code { font-size: 0.75rem; color: #64748b; text-transform: uppercase; }
        .product-title { font-size: 0.95rem; margin: 0.2rem 0; font-weight: 600; }
        .product-price { font-size: 1.1rem; color: var(--dark); font-weight: bold; margin-bottom: 0.6rem; }
        
        .action-buttons { display: flex; flex-direction: column; gap: 0.4rem; }
        .action-buttons .btn { width: 100%; padding: 0.5rem; font-size: 0.8rem; }

        .admin-actions {
            margin-top: 0.6rem; border-top: 1px solid #e2e8f0; padding-top: 0.6rem; display: flex; gap: 0.4rem;
        }
        .admin-actions .btn { flex: 1; padding: 0.4rem; font-size: 0.75rem; }

        .modal {
            display: none; position: fixed; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.8); justify-content: center; align-items: center; padding: 1rem;
        }
        .modal-content-panel {
            background: white; width: 100%; max-width: 450px; border-radius: 12px; padding: 1.5rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); max-height: 90vh; overflow-y: auto;
        }
        .form-group { margin-bottom: 0.8rem; }
        .form-group label { display: block; margin-bottom: 0.3rem; font-weight: bold; font-size: 0.85rem; }
        .form-group input, .form-group select {
            width: 100%; padding: 0.6rem; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 0.9rem;
        }
        #imageModal .modal-content-img { max-width: 100%; max-height: 80vh; border-radius: 8px; }
        .loading { text-align: center; font-weight: bold; padding: 2rem; color: #64748b; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>

    <header>
        <h1>Earnings Sale</h1>
        <div class="header-actions">
            <button id="add-prod-btn" class="btn btn-primary" onclick="openAdminPopup()" style="display:none;">+ Add Product</button>
            <button id="login-btn" class="btn btn-secondary" onclick="toggleLogin()">Admin Login</button>
        </div>
    </header>

    <div class="container">
        <h2>Available Products</h2>
        <div id="loading-indicator" class="loading">Loading products from cloud...</div>
        <div class="products-grid" id="products-container"></div>
    </div>

    <div id="adminModal" class="modal">
        <div class="modal-content-panel">
            <h2 id="form-title" style="margin-top:0;">Add Product</h2>
            <form id="product-form" onsubmit="saveProduct(event)">
                <input type="hidden" id="product-id">
                <div class="form-group">
                    <label>Product Code (Auto-generated if blank)</label>
                    <input type="text" id="prod-code" placeholder="e.g., PRD-001">
                </div>
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" id="prod-name" required>
                </div>
                <div class="form-group">
                    <label>Price</label>
                    <input type="text" id="prod-price" placeholder="e.g., ₹500" required>
                </div>
                <div class="form-group">
                    <label>Image Source</label>
                    <input type="text" id="prod-img" placeholder="Paste Web URL Link" required>
                    <input type="file" id="prod-file" accept="image/*" onchange="handleImageUpload(event)" style="margin-top:5px; border:none; padding:0;">
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="prod-status">
                        <option value="In Stock">In Stock</option>
                        <option value="Out of Stock">Out of Stock</option>
                        <option value="Sold">Sold</option>
                    </select>
                </div>
                <div style="display:flex; gap:0.5rem; margin-top:1.5rem;">
                    <button type="submit" class="btn btn-primary" style="flex:1;">Save</button>
                    <button type="button" class="btn btn-secondary" onclick="closeAdminPopup()" style="flex:1;">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <div id="imageModal" class="modal" onclick="closeLightbox()">
        <img class="modal-content-img" id="modalImg">
    </div>

    <script>
        // --- PASTE YOUR FIREBASE CREDENTIALS HERE ---
        const firebaseConfig = {
  apiKey: "AIzaSyAA60xkGygpG9no7Qbq3xsxpCO5hupDHPE",
  authDomain: "my-earings-85407.firebaseapp.com",
  databaseURL: "https://my-earings-85407-default-rtdb.firebaseio.com",
  projectId: "my-earings-85407",
  storageBucket: "my-earings-85407.firebasestorage.app",
  messagingSenderId: "637254172278",
  appId: "1:637254172278:web:33e9741e7017564a5f2957"
};
        // --------------------------------------------

        // Initialize Firebase Connection
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let products = [];
        let isAdmin = false;
        let uploadedImageBase64 = "";
        const WHATSAPP_NUMBER = "918778096977";

        // Listen for real-time live database modifications across all users
        database.ref('products').on('value', (snapshot) => {
            document.getElementById('loading-indicator').style.display = 'none';
            const data = snapshot.val();
            products = [];
            if (data) {
                // Parse database object map structure into list arrays
                Object.keys(data).forEach(key => {
                    products.push({ dbKey: key, ...data[key] });
                });
            }
            renderProducts();
        });

        function renderProducts() {
            const container = document.getElementById('products-container');
            container.innerHTML = '';

            if (products.length === 0) {
                container.innerHTML = '<div class="loading">No products listed yet!</div>';
                return;
            }

            products.forEach(product => {
                let overlayHTML = '';
                if (product.status === "Sold") {
                    overlayHTML = `<div class="status-overlay" style="background-color: rgba(220,38,38,0.5)">Sold</div>`;
                } else if (product.status === "Out of Stock") {
                    overlayHTML = `<div class="status-overlay" style="background-color: rgba(234,88,12,0.5)">Out of Stock</div>`;
                }

                const waMessage = encodeURIComponent(`Hi, I am interested in this product:\nCode: ${product.code}\nName: ${product.name}\nPrice: ${product.price}`);
                const waLink = `https://wa.me/${WHATSAPP_NUMBER}?text=${waMessage}`;

                let adminButtons = '';
                if (isAdmin) {
                    adminButtons = `
                        <div class="admin-actions">
                            <button class="btn btn-secondary" onclick="editProduct('${product.dbKey}')">Edit</button>
                            <button class="btn btn-danger" onclick="deleteProduct('${product.dbKey}')">Delete</button>
                        </div>
                    `;
                }

                container.innerHTML += `
                    <div class="product-card">
                        <div class="img-container" onclick="openLightbox('${product.img}')">
                            <img src="${product.img}" class="product-img" alt="${product.name}">
                            ${overlayHTML}
                        </div>
                        <div class="product-info">
                            <div>
                                <div class="product-code">Code: ${product.code}</div>
                                <h3 class="product-title">${product.name}</h3>
                                <div class="product-price">${product.price}</div>
                            </div>
                            <div>
                                <div class="action-buttons">
                                    <button class="btn btn-secondary" onclick="alert('Added to local cart!')">Add to Cart</button>
                                    <a href="${waLink}" target="_blank" class="btn btn-success">Buy Now</a>
                                </div>
                                ${adminButtons}
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        // Window Handlers
        function openAdminPopup() { clearForm(); document.getElementById('adminModal').style.display = "flex"; }
        function closeAdminPopup() { document.getElementById('adminModal').style.display = "none"; }
        function openLightbox(imgSrc) { document.getElementById('modalImg').src = imgSrc; document.getElementById('imageModal').style.display = "flex"; }
        function closeLightbox() { document.getElementById('imageModal').style.display = "none"; }

        function toggleLogin() {
            if (isAdmin) {
                isAdmin = false;
                document.getElementById('login-btn').innerText = "Admin Login";
                document.getElementById('add-prod-btn').style.display = "none";
            } else {
                const user = prompt("Enter Username:");
                const pass = prompt("Enter Password:");
                if (user === "admin" && pass === "admin") {
                    isAdmin = true;
                    document.getElementById('login-btn').innerText = "Logout";
                    document.getElementById('add-prod-btn').style.display = "inline-flex";
                } else {
                    alert("Invalid Credentials!");
                }
            }
            renderProducts();
        }

        function handleImageUpload(event) {
            const file = event.target.files[0];
            const reader = new FileReader();
            reader.onloadend = function() {
                uploadedImageBase64 = reader.result;
                document.getElementById('prod-img').value = "Local Image Loaded";
            }
            if (file) reader.readAsDataURL(file);
        }

        // Cloud Database Save Operations
        function saveProduct(e) {
            e.preventDefault();
            const dbKey = document.getElementById('product-id').value;
            const name = document.getElementById('prod-name').value;
            const price = document.getElementById('prod-price').value;
            let code = document.getElementById('prod-code').value.trim();
            let img = document.getElementById('prod-img').value;
            const status = document.getElementById('prod-status').value;

            if (img === "Local Image Loaded") img = uploadedImageBase64;
            if (!code) code = "PRD-" + Math.floor(1000 + Math.random() * 9000);

            const productPayload = { code, name, price, img, status, updatedTime: Date.now() };

            if (dbKey) {
                // Push direct update to specific object index inside Firebase
                database.ref('products/' + dbKey).set(productPayload)
                    .then(() => closeAdminPopup());
            } else {
                // Generate a new cloud location entry structural pointer
                database.ref('products').push(productPayload)
                    .then(() => closeAdminPopup());
            }
        }

        function editProduct(dbKey) {
            const prod = products.find(p => p.dbKey === dbKey);
            document.getElementById('product-id').value = prod.dbKey;
            document.getElementById('prod-code').value = prod.code;
            document.getElementById('prod-name').value = prod.name;
            document.getElementById('prod-price').value = prod.price;
            document.getElementById('prod-img').value = prod.img;
            document.getElementById('prod-status').value = prod.status;
            
            document.getElementById('form-title').innerText = "Edit " + prod.code;
            document.getElementById('adminModal').style.display = "flex";
        }

        function deleteProduct(dbKey) {
            if(confirm("Delete this product from cloud storage?")) {
                database.ref('products/' + dbKey).remove();
            }
        }

        function clearForm() {
            document.getElementById('product-form').reset();
            document.getElementById('product-id').value = "";
            document.getElementById('form-title').innerText = "Add Product";
            uploadedImageBase64 = "";
        }
    </script>
</body>
</html>
